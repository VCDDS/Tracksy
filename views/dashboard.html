<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="topbar">

    <div class="nav-left">
        <span class="logo">⏱️ Tracksy</span>

        <div class="dropdown" id="adminMenu">
            <button type="button" class="admin-btn" onclick="toggleAdminMenu()">🚩 Admin</button>

            <div class="dropdown-content" id="adminDropdown">
                <a href="#" onclick="loadPage('projekt'); closeAdminDropdown(); return false;">🗂️ Projekt erstellen</a>
                <a href="#" onclick="loadPage('archiv'); closeAdminDropdown(); return false;">📦 Archiv</a>
                <a href="#" onclick="loadPage('adminDaten'); closeAdminDropdown(); return false;">🧹 Daten bereinigen</a>
                <a href="#" onclick="loadPage('zeitenKorrigieren'); closeAdminDropdown(); return false;">🛠️ Zeiten korrigieren</a>
                <a href="#" onclick="loadPage('benutzerVerwaltung'); closeAdminDropdown(); return false;">👤 Benutzer verwalten</a>
                <a href="#" onclick="printOrPDF(); closeAdminDropdown(); return false;">🖨️ Drucken/PDF speichern</a>
            </div>
        </div>

        <button onclick="loadPage('start')">🏠 <span>Start</span></button>
        <button onclick="loadPage('zeiten')">⌛ <span>Zeiten</span></button>
        <button onclick="loadPage('auswertung')">📊 <span>Auswertung</span></button>
        <button onclick="loadPage('report')">💻 <span>Report</span></button>
        <button onclick="loadPage('projekte')">📁 <span>Projekte</span></button>
        <button onclick="loadPage('dokumente')">📄 <span>Dokumente</span></button>
        <button onclick="loadPage('nachrichten')">📩 <span>Nachrichten</span></button>
        <button onclick="loadPage('benutzer')">👤 <span>Benutzer</span></button>
    
        </div>


    <div class="nav-right">
        <span id="datetime"></span>
        <span class="user">👤 <span id="user"></span></span>
        <button class="logout-btn" onclick="logout()">🔒 Abmelden</button>
    </div>

</nav>

<div id="content"></div>

<div id="reportModal" class="modal">
    <div class="modal-box">
        <h2>Bericht schreiben</h2>
        <textarea id="reportText" placeholder="Bericht eingeben"></textarea>
        <button onclick="saveReportPopup()">Speichern</button>
        <button onclick="closeReportPopup()">Abbrechen</button>
    </div>
</div>

<script>
const content = document.getElementById("content");

let currentUser = localStorage.getItem("username") || "Gast";
let isAdmin = localStorage.getItem("isAdmin") === "true";

document.getElementById("user").textContent = currentUser;
function updateDateTime(){

let now = new Date();

let date = now.toLocaleDateString("de-DE");
let time = now.toLocaleTimeString("de-DE");

document.getElementById("datetime").textContent =
    "📅 " + date + " 🕒 " + time;
}

setInterval(updateDateTime, 1000);

updateDateTime();

if(!isAdmin){
    document.getElementById("adminMenu").style.display = "none";
}

async function apiGet(url){
    let res = await fetch(url);
    return await res.json();
}

async function apiPost(url, data){
    let res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    return await res.text();
}

async function loadPage(page){

    currentPage = page;

    if(page === "start"){
        let projects = await apiGet("/projects");
        let times = await apiGet("/times");

        let running = times.find(t => t.username === currentUser && !t.stop_time);

        let runningText = running
    ? (
        running.is_paused
        ? "⏸️ Pause: " + running.project + " / " + running.task + "<br>Seit: " + running.start_time + "<br>Pause seit: " + running.pause_time
        : "🟢 Läuft: " + running.project + " / " + running.task + "<br>Seit: " + running.start_time
    )
        : "⚪ Keine laufende Zeit";

        content.innerHTML = `
        <div class="center-box">
            <h2>Start</h2>

            <div class="running-box">${runningText}</div>

            <select id="startProject" class="field-project">
                <option value="">Projekt wählen</option>
            </select>

            <select id="startTask" class="field-task">
                <option value="">Aufgabe wählen</option>
            </select>

            <button class="start-btn" onclick="startTime()">Start</button>
            <button onclick="pauseTime()">Pause</button>
            <button onclick="resumeTime()">Weiter</button>
            <button class="stop-btn" onclick="stopTime()">Stop</button>
        </div>
        `;

        let pSelect = document.getElementById("startProject");
        let tSelect = document.getElementById("startTask");

        projects.forEach(p => {
            pSelect.innerHTML += `<option value="${p.name}">${p.name}</option>`;
        });

        pSelect.onchange = function(){
            let selected = projects.find(p => p.name === this.value);
            tSelect.innerHTML = `<option value="">Aufgabe wählen</option>`;

            if(selected){
                selected.tasks.forEach(t => {
                    tSelect.innerHTML += `<option value="${t.name}">${t.name}</option>`;
                });
            }
        };

        return;
    }

    if(page === "zeiten"){
        let times = await apiGet("/times");

        let html = `
        <h2>Zeiten</h2>
        <table>
            <tr>
                <th>User</th>
                <th>Projekt</th>
                <th>Aufgabe</th>
                <th>Start</th>
                <th>Stop</th>
                <th>Pause</th>
                <th>Status</th>
            </tr>
        `;

        times.forEach(t => {
            html += `
            <tr>
                <td>${t.username || "-"}</td>
                <td>${t.project || "-"}</td>
                <td>${t.task || "-"}</td>
                <td>${t.start_time || "-"}</td>
                <td>${t.stop_time || "-"}</td>
                <td>${t.pause_time || "-"}</td>
                <td>
                ${
                t.stop_time
                ? "⏹️ Gestoppt"
                : t.is_paused
                ? "⏸️ Pause"
                : "▶️ Aktiv"
                }
                </td>
            </tr>`;
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }

    if(page === "auswertung"){
        let times = await apiGet("/times");

        let users = {};
        let colors = ["#22c55e","#3b82f6","#f97316","#a855f7","#ef4444","#14b8a6","#eab308","#ec4899"];
        let taskColors = {};

        times.forEach(t => {
            if(t.start_time && t.stop_time){
                let user = t.username || "Unbekannt";
                let label = (t.project || "-") + " / " + (t.task || "-");

                let start = new Date(t.start_time);
                let stop = new Date(t.stop_time);
                let minutes = Math.floor((stop - start) / 1000 / 60);

                if(!users[user]) users[user] = {};
                if(!users[user][label]) users[user][label] = 0;

                users[user][label] += minutes;

                if(!taskColors[label]){
                    taskColors[label] = colors[Object.keys(taskColors).length % colors.length];
                }
            }
        });

        let html = `<h2>Auswertung Zeit</h2>`;

        Object.keys(users).forEach((user, index) => {
            html += `
            <div class="chart-box">
                <h3>👤 ${user}</h3>
                <canvas id="userChart_${index}"></canvas>
            </div>`;
        });

        content.innerHTML = html;

        Object.keys(users).forEach((user, index) => {
            let labels = Object.keys(users[user]);
            let data = Object.values(users[user]);

            new Chart(document.getElementById("userChart_" + index), {
                type: "doughnut",
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: labels.map(l => taskColors[l])
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: "right",
                            labels: { color: "white" }
                        }
                    }
                }
            });
        });

        return;
    }

    if(page === "report"){
        let times = await apiGet("/times");

        let html = `
        <h2>Report</h2>
        <table>
            <tr>
                <th>User</th>
                <th>Projekt</th>
                <th>Aufgabe</th>
                <th>Bericht</th>
                <th>Datum</th>
                <th>Gesamtzeit</th>
                <th>Status</th>
                <th>Aktion</th>
            </tr>
        `;

        times.forEach(t => {
            let duration = "-";

            if(t.start_time && t.stop_time){
                let diff = Math.floor((new Date(t.stop_time) - new Date(t.start_time)) / 1000);
                let h = Math.floor(diff / 3600);
                let m = Math.floor((diff % 3600) / 60);
                let s = diff % 60;

                duration =
                    String(h).padStart(2, "0") + ":" +
                    String(m).padStart(2, "0") + ":" +
                    String(s).padStart(2, "0");
            }

            html += `
            <tr>
                <td>${t.username || "-"}</td>
                <td>${t.project || "-"}</td>
                <td>${t.task || "-"}</td>
                <td>${t.report || "-"}</td>
                <td>${t.stop_time || "-"}</td>
                <td>${duration}</td>
                <td>${t.admin_only ? "❌ kein Stop" : "-"}</td>

<td>
    ${
        t.username === currentUser
        ? `<button onclick="editOwnReport(${t.id}, \`${t.report || ""}\`)">✏️ Bearbeiten</button>`
        : "-"
    }
</td>
            </tr>`;
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }

    if(page === "projekte"){
        let projects = await apiGet("/projects");

        let html = `
        <h2>Projekte</h2>
        <table>
            <tr>
                <th>Projekt</th>
                <th>Aufgaben</th>
                <th>Aktuell in Bearbeitung</th>
            </tr>
        `;

        projects.forEach(p => {
            let tasks = p.tasks.map(t => t.name).join("<br>");
            let status = p.current_task ? `👤 ${p.current_user_name} bearbeitet: ${p.current_task}` : "-";

            html += `
            <tr>
                <td>${p.name}</td>
                <td>${tasks || "-"}</td>
                <td>${status}</td>
            </tr>`;
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }

    if(page === "projekt"){
        let projects = await apiGet("/projects");

        let html = `
        <h2>Projekt erstellen</h2>

        <input id="pName" placeholder="Projektname">
        <input id="pDesc" maxlength="100" placeholder="Beschreibung max. 100 Zeichen">
        <button onclick="addProject()">Projekt erstellen</button>

        <h2>Projekt Verwaltung</h2>

        <table>
            <tr>
                <th>Projekt</th>
                <th>Beschreibung</th>
                <th>Aufgaben</th>
                <th>Aktuell</th>
                <th>Aktionen</th>
            </tr>
        `;

        projects.forEach(p => {
            let tasks = p.tasks.map(t => t.name).join("<br>");
            let status = p.current_task ? `👤 ${p.current_user_name} bearbeitet: ${p.current_task}` : "-";

            html += `
            <tr>
                <td>${p.name}</td>
                <td>${p.description || "-"}</td>
                <td>${tasks || "-"}</td>
                <td>${status}</td>
                <td>
                    <button onclick="addTask(${p.id})">➕ Aufgabe</button>
                    <button onclick="editTask(${p.id})">✏️ Aufgabe</button>
                    <button onclick="archiveTask(${p.id})">📦 Aufgabe</button>
                    <button onclick="deleteProject(${p.id})">🗑️ Projekt</button>
                </td>
            </tr>`;
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }

    if(page === "archiv"){
        let projects = await apiGet("/projects");

        let html = `
        <h2>Archiv</h2>
        <table>
            <tr>
                <th>Projekt</th>
                <th>Archivierte Aufgabe</th>
                <th>Aktion</th>
            </tr>
        `;

        projects.forEach(p => {
            p.archiveTasks.forEach(t => {
                html += `
                <tr>
                    <td>${p.name}</td>
                    <td>${t.name}</td>
                    <td>
                        <button onclick="restoreTask(${t.id})">↩️ Wiederherstellen</button>
                        <button onclick="deleteTaskFinal(${t.id})">❌ Löschen</button>
                    </td>
                </tr>`;
            });
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }

    if(page === "nachrichten"){
        let users = await apiGet("/users");
        let messages = await apiGet("/messages/" + currentUser);

        let html = `
        <h2>Nachrichten</h2>

        <h3>Nachricht schreiben</h3>

        <select id="msgTo">
            <option value="">Empfänger wählen</option>
        `;

        users.forEach(u => {
            html += `<option value="${u.username}">${u.username}</option>`;
        });

        html += `
        </select>

        <input id="msgText" placeholder="Nachricht schreiben">
        <button onclick="sendMessage()">Senden</button>

        <h3>Meine Nachrichten</h3>

        <table>
            <tr>
                <th>Von</th>
                <th>Nachricht</th>
                <th>Datum</th>
                <th>Aktionen</th>
            </tr>
        `;

        messages.forEach(m => {
            html += `
            <tr>
                <td>${m.sender}</td>
                <td>${m.text}</td>
                <td>${m.date}</td>
                <td>
                    <button onclick="printMessage(${m.id})">🖨️ Drucken/PDF</button>
                    <button onclick="deleteMessage(${m.id})">❌ Löschen</button>
                </td>
            </tr>`;
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }

    if(page === "benutzer"){
    let users = await apiGet("/users");
    let ownUser = users.find(u => u.username === currentUser);

    content.innerHTML = `
    <h2>Benutzer</h2>

    <table>
        <tr><th>Feld</th><th>Deine Daten</th></tr>
        <tr><td>Name</td><td>${ownUser ? ownUser.username : currentUser}</td></tr>
        <tr><td>Email</td><td>${ownUser && ownUser.email ? ownUser.email : "-"}</td></tr>
        <tr><td>Rolle</td><td>${ownUser && ownUser.is_admin ? "Admin" : "Benutzer"}</td></tr>
        <tr><td>Letzte Änderung</td><td>${ownUser && ownUser.last_change ? ownUser.last_change : "-"}</td></tr>
    </table>

    <h3>Eigene Daten ändern</h3>

    <input id="ownName" value="${ownUser ? ownUser.username : currentUser}" placeholder="Name">
    <input id="ownEmail" value="${ownUser && ownUser.email ? ownUser.email : ""}" placeholder="Email">
    <input id="ownPw" type="password" placeholder="Neues Passwort">

    <button onclick="changeOwnUser()">Speichern</button>
    `;

    return;
}

if(page === "dokumente"){

let docs = await apiGet("/documents");

let html = `
<h2>Dokumente</h2>
`;

if(isAdmin){
    html += `
    <input type="file" id="pdfFile" accept=".pdf" multiple>
    <input id="pdfPassword" placeholder="Optional Passwort">
    <button onclick="uploadPDF()">PDF hochladen</button>
    <button onclick="deleteSelectedDocuments()">Ausgewählte löschen</button>
    <br><br>
    `;
}

html += `
<table>
    <tr>
        ${isAdmin ? "<th>Auswahl</th>" : ""}
        <th>Datei</th>
        <th>Von</th>
        <th>Datum</th>
        <th>Sicherheit</th>
        <th>Aktion</th>
    </tr>
`;

docs.forEach(d => {

html += `
<tr>
    ${isAdmin ? `<td><input type="checkbox" class="docCheck" value="${d.id}"></td>` : ""}
    <td>
        ${d.originalname}
        ${isAdmin ? `<br>Passwort: ${d.doc_password || "-"}` : ""}
    </td>
    <td>${d.uploaded_by}</td>
    <td>${d.upload_date}</td>
    <td>${d.doc_password ? "🔒 Passwort gesichert" : "🔓 Ohne Passwort"}</td>
    <td>
        <button class="doc-btn" onclick="openDocument(${d.id}, ${d.doc_password ? "true" : "false"})">📄 Öffnen</button>
        ${
            isAdmin
            ? `<button onclick="deleteDocument(${d.id})">❌ Löschen</button>`
            : ""
        }
    </td>
</tr>
`;
});

html += `</table>`;

content.innerHTML = html;
return;
}

    if(page === "benutzerVerwaltung"){
        let users = await apiGet("/users");

        let html = `
        <h2>Benutzer verwalten</h2>

        <input id="newUser" placeholder="Benutzername">
        <input id="newEmail" placeholder="E-Mail">
        <input id="newPw" placeholder="Passwort">
        <button onclick="addUser()">Benutzer erstellen</button>

        <table>
            <tr>
                <th>Name</th>
                <th>E-Mail</th>
                <th>Admin</th>
                <th>Aktionen</th>
            </tr>
        `;

        users.forEach(u => {
            html += `
            <tr>
                <td>${u.username}</td>
                <td>${u.email || "-"}</td>
                <td>${u.is_admin ? "✔" : "❌"}</td>
                <td>
                    <button onclick="editUser('${u.username}', '${u.email || ""}', ${u.is_admin})">✏️ Bearbeiten</button>
                    ${
                    u.username === "Dominic Schulteis"
                    ? "🔒 Hauptadmin"
                    : `<button onclick="deleteUser('${u.username}')">❌ Löschen</button>`
                    }
                </td>
            </tr>`;
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }

    if(page === "zeitenKorrigieren"){
        let times = await apiGet("/times");

        let html = `
        <h2>Zeiten korrigieren</h2>
        <button onclick="manualTime()">➕ Zeit nachtragen</button>
        <table>
            <tr>
                <th>#</th>
                <th>User</th>
                <th>Projekt</th>
                <th>Aufgabe</th>
                <th>Start</th>
                <th>Stop</th>
                <th>Bericht</th>
                <th>Aktion</th>
            </tr>
        `;

        times.forEach(t => {
            html += `
            <tr>
                <td>${t.id}</td>
                <td>${t.username}</td>
                <td>${t.project}</td>
                <td>${t.task}</td>
                <td>${t.start_time}</td>
                <td>${t.stop_time}</td>
                <td>${t.report}</td>
                <td><button onclick="editTime(${t.id})">✏️ Bearbeiten</button></td>
            </tr>`;
        });

        html += "</table>";
        content.innerHTML = html;
        return;
    }


    if(page === "adminDaten"){
        let times = await apiGet("/times");

        let html = `
<h2>Daten bereinigen</h2>

<div class="center-box">

    <h3>Zeiten</h3>
<table>
${times.map(t => `
<tr>
<td>${t.username}</td>
<td>${t.project}</td>
<td><button onclick="deleteTime(${t.id})">🗑️ Löschen</button></td>
</tr>
`).join("")}
</table>

<h3>Reports</h3>
<table>
${times.map(t => `
<tr>
<td>${t.report || "-"}</td>
<td><button onclick="deleteSingleReport(${t.id})">🗑️ Löschen</button></td>
</tr>
`).join("")}
</table>

<h3>Auswertungen</h3>
<table>
${times.map(t => `
<tr>
<td>${t.username}</td>
<td>${t.project}</td>
<td><button onclick="deleteSingleAuswertung(${t.id})">🗑️ Löschen</button></td>
</tr>
`).join("")}
</table>

    </div>
`;

content.innerHTML = html;
return;
}

}

async function openDocument(id, hasPassword){

let password = "";

if(hasPassword){
    password = prompt("Passwort eingeben:");

    if(password === null){
        password = "";
    }
}

let res = await fetch("/open-document", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        id,
        password
    })
});

let data = await res.json();

if(!data.success){
    alert(data.message || "Fehler");
    return;
}

window.open(data.url, "_blank");
}

async function startTime(){
    let project = document.getElementById("startProject").value;
    let task = document.getElementById("startTask").value;

    if(!project || !task){
        alert("Projekt & Aufgabe wählen");
        return;
    }

    let msg = await apiPost("/start-time", {
        username: currentUser,
        project,
        task
    });

    alert(msg);
    loadPage("start");
}

function stopTime(){
    document.getElementById("reportModal").style.display = "flex";
}

function closeReportPopup(){
    document.getElementById("reportModal").style.display = "none";
}

async function saveReportPopup(){
    let report = document.getElementById("reportText").value;

    if(!report){
        alert("Bericht erforderlich");
        return;
    }

    let msg = await apiPost("/stop-time", {
        username: currentUser,
        report,
        adminOnly: false
    });

    document.getElementById("reportText").value = "";
    closeReportPopup();

    alert(msg);
    loadPage("start");
}

async function addProject(){
    let name = document.getElementById("pName").value;
    let desc = document.getElementById("pDesc").value;

    let msg = await apiPost("/create-project", { name, desc });
    alert(msg);
    loadPage("projekt");
}

async function deleteProject(id){
    if(!confirm("Projekt wirklich löschen?")) return;

    let msg = await apiPost("/delete-project", { id });
    alert(msg);
    loadPage("projekt");
}

async function addTask(projectId){
    let name = prompt("Aufgabe erstellen:");
    if(!name) return;

    let msg = await apiPost("/create-task", { projectId, name });
    alert(msg);
    loadPage("projekt");
}

async function editTask(projectId){
    let projects = await apiGet("/projects");
    let project = projects.find(p => p.id === projectId);

    let list = project.tasks.map(t => t.id + ": " + t.name).join("\n");
    let taskId = prompt("Welche Aufgabe bearbeiten?\n" + list);

    if(!taskId) return;

    let name = prompt("Neuer Aufgabenname:");
    if(!name) return;

    let msg = await apiPost("/edit-task", { taskId, name });
    alert(msg);
    loadPage("projekt");
}

async function archiveTask(projectId){
    let projects = await apiGet("/projects");
    let project = projects.find(p => p.id === projectId);

    let list = project.tasks.map(t => t.id + ": " + t.name).join("\n");
    let taskId = prompt("Welche Aufgabe archivieren?\n" + list);

    if(!taskId) return;

    let msg = await apiPost("/archive-task", { taskId });
    alert(msg);
    loadPage("projekt");
}

async function restoreTask(taskId){
    let msg = await apiPost("/restore-task", { taskId });
    alert(msg);
    loadPage("archiv");
}

async function deleteTaskFinal(taskId){
    if(!confirm("Aufgabe wirklich löschen?")) return;

    let msg = await apiPost("/delete-task", { taskId });
    alert(msg);
    loadPage("archiv");
}

async function addUser(){
    let name = document.getElementById("newUser").value;
    let email = document.getElementById("newEmail").value;
    let pw = document.getElementById("newPw").value;

    if(!name || !pw){
        alert("Bitte alles ausfüllen");
        return;
    }

    let admin = confirm("Admin Benutzer erstellen?");

    let msg = await apiPost("/create-user", {
        name,
        email,
        pw,
        admin
    });

    alert(msg);
    loadPage("benutzerVerwaltung");
}

async function editUser(oldName, oldEmail, oldAdmin){
    let newName = prompt("Name:", oldName);
    if(newName === null) return;

    let email = prompt("Email:", oldEmail);
    if(email === null) return;

    let pw = prompt("Passwort:");
    if(pw === null) return;

    let admin = confirm("Admin?");

    let msg = await apiPost("/edit-user", {
        oldName,
        newName,
        email,
        pw,
        admin
    });

    alert(msg);
    loadPage("benutzerVerwaltung");
}

async function editTime(id){
    let times = await apiGet("/times");
    let t = times.find(x => x.id === id);

    if(!t){
        alert("Zeit nicht gefunden");
        return;
    }

    let username = prompt("User:", t.username);
    if(username === null) return;

    let project = prompt("Projekt:", t.project);
    if(project === null) return;

    let task = prompt("Aufgabe:", t.task);
    if(task === null) return;

    let start_time = prompt("Start:", t.start_time);
    if(start_time === null) return;

    let stop_time = prompt("Stop:", t.stop_time);
    if(stop_time === null) return;

    let report = prompt("Bericht:", t.report);
    if(report === null) return;

    let msg = await apiPost("/edit-time", {
        id,
        username,
        project,
        task,
        start_time,
        stop_time,
        report
    });

    alert(msg);
    loadPage("zeitenKorrigieren");
}

function closeAdminDropdown(){
    let menu = document.getElementById("adminDropdown");
    if(menu){
        menu.style.display = "none";
    }
}

async function logout(){

let times = await apiGet("/times");

let running = times.find(t =>
    t.username === currentUser &&
    !t.stop_time
);

if(running){

    let report = prompt("Bericht eingeben:");

    if(report === null || report.trim() === ""){
        alert("Bericht erforderlich");
        return;
    }

    await apiPost("/stop-time", {
        username: currentUser,
        report,
        adminOnly: true
    });
}

localStorage.removeItem("username");
localStorage.removeItem("isAdmin");

location.href = "/login";
}

function toggleAdminMenu(){
    let menu = document.getElementById("adminDropdown");

    if(menu.style.display === "block"){
        menu.style.display = "none";
    }else{
        menu.style.display = "block";
    }
}

    if(!newName || !pw){

async function uploadPDF(){

let files = document.getElementById("pdfFile").files;
let password = document.getElementById("pdfPassword").value;

if(!files || files.length === 0){
    alert("PDF wählen");
    return;
}

for(let file of files){

    let formData = new FormData();

    formData.append("pdf", file);
    formData.append("username", currentUser);
    formData.append("password", password);

    let res = await fetch("/upload-document", {
        method: "POST",
        body: formData
    });

    let msg = await res.text();

if(msg !== "PDF hochgeladen"){
    alert(msg);
}

alert("PDF hochgeladen");

loadPage("dokumente");
}

async function deleteSelectedDocuments(){

let checks = document.querySelectorAll(".docCheck:checked");

if(checks.length === 0){
    alert("Nichts ausgewählt");
    return;
}

if(!confirm("Ausgewählte Dokumente löschen?")) return;

for(let c of checks){

    await apiPost("/delete-document", {
        id: c.value
    });
}

alert("Dokumente gelöscht");

loadPage("dokumente");
}

setInterval(async () => {

if(currentPage !== "start") return;

let times = await apiGet("/times");

let running = times.find(t =>
    t.username === currentUser &&
    !t.stop_time
);

let runningBox = document.querySelector(".running-box");

if(runningBox){
    runningBox.innerHTML = running
        ? (
            running.is_paused
            ? "⏸️ Pause: " + running.project + " / " + running.task +
              "<br>Seit: " + running.start_time +
              "<br>Pause seit: " + running.pause_time
            : "🟢 Läuft: " + running.project + " / " + running.task +
              "<br>Seit: " + running.start_time
        )
        : "⚪ Keine laufende Zeit";
}

}, 10000);
