<script>
const content = document.getElementById("content");

let currentUser = localStorage.getItem("username") || "Gast";
let isAdmin = localStorage.getItem("isAdmin") === "true";
let userRole = localStorage.getItem("userRole") || (isAdmin ? "admin" : "user");

}

setInterval(updateDateTime, 1000);

    document.getElementById("adminMenu").style.display = "none";
}

if(isCustomer){
    document.getElementById("adminMenu").style.display = "none";

    document.querySelectorAll(".nav-left button").forEach(btn => {

        if(

            !text.includes("Report") &&

            !text.includes("Nachrichten") &&

        ){

        }

async function apiGet(url){
    let res = await fetch(url);
    return await res.json();
}

async function apiPost(url, data){
    let res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    return await res.text();
}

function parseGermanDate(str){
    if(!str) return null;

    let parts = str.split(", ");
    let dateParts = parts[0].split(".");
    let timeParts = (parts[1] || "00:00:00").split(":");

    return new Date(
        parseInt(dateParts[2]),
        parseInt(dateParts[1]) - 1,
        parseInt(dateParts[0]),
        parseInt(timeParts[0] || 0),
        parseInt(timeParts[1] || 0),
        parseInt(timeParts[2] || 0)
    );
}

function getDateValue(str){
    let d = parseGermanDate(str);
    return d ? d.getTime() : 0;
}

async function loadPage(page){

currentPage = page;

if(isCustomer){
    const allowedCustomerPages = ["start", "report", "vorschlaege", "nachrichten", "benutzer"];

    if(!allowedCustomerPages.includes(page)){
        page = "start";

    if(page === "start"){

            let pauseMinutes = t.pause_total || 0;
            let workMinutes = totalMinutes - pauseMinutes;

            if(workMinutes < 0) workMinutes = 0;
            if(pauseMinutes < 0) pauseMinutes = 0;

            if(!users[user]) users[user] = {};
            if(!users[user][label]){
                users[user][label] = {
                    work: 0,
                    pause: 0
                };
            }

            users[user][label].work += workMinutes;
            users[user][label].pause += pauseMinutes;
        }
    });

            options: {

                        ticks: { color: "white" }

                    y: {
                        stacked: true,

                        ticks: { color: "white" }
                    }

}

if(!start || !stop) return;

let diff = Math.floor((stop - start) / 1000) - ((t.pause_total || 0) * 60);

</td>

${

}

for(let day = 1; day <= lastDay.getDate(); day++){

async function openDocument(id, hasPassword){

let password = "";

if(hasPassword){
    password = prompt("Passwort eingeben:");

    if(password === null){
        password = "";
    }
}

let res = await fetch("/open-document", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        id,
        password
    })
});

let data = await res.json();

if(!data.success){
    alert(data.message || "Fehler");
    return;
}

window.open(data.url, "_blank");
}

async function uploadPDF(){

let files = document.getElementById("pdfFile").files;
let password = document.getElementById("pdfPassword").value;

if(!files || files.length === 0){
    alert("PDF wählen");
    return;
}

let successCount = 0;

for(let file of files){

    let formData = new FormData();

    formData.append("pdf", file);
    formData.append("username", currentUser);
    formData.append("password", password);

    let res = await fetch("/upload-document", {
        method: "POST",
        body: formData
    });

    let msg = await res.text();

    if(msg === "PDF hochgeladen"){
        successCount++;
    }else{
        alert(msg);
    }
}

if(successCount > 0){
    alert(successCount + " PDF hochgeladen");
}

loadPage("dokumente");
}

function changeCalendarMonth(direction){

window.selectedMonth += direction;

if(window.selectedMonth < 0){

    window.selectedYear--;
}

    window.selectedMonth = 0;
    window.selectedYear++;
}

async function checkNewSuggestions(){

let suggestions = await apiGet("/suggestions");

let lastSeen = localStorage.getItem("lastSuggestionSeen") || "0";

let hasNew = suggestions.some(s => {

    let suggestionNew = getDateValue(s.created_at) > parseInt(lastSeen);

    let commentNew = (s.comments || []).some(c =>
        getDateValue(c.created_at) > parseInt(lastSeen)
    );

    return suggestionNew || commentNew;
});

let badge = document.getElementById("suggestionBadge");

if(badge){
    badge.style.display = hasNew ? "inline-block" : "none";
}
}

async function markSuggestionsSeen(){

let suggestions = await apiGet("/suggestions");

let allDates = [];

suggestions.forEach(s => {
    allDates.push(getDateValue(s.created_at));

    (s.comments || []).forEach(c => {
        allDates.push(getDateValue(c.created_at));
    });
});

if(allDates.length > 0){
    let newest = allDates.sort((a,b) => b-a)[0];
    localStorage.setItem("lastSuggestionSeen", newest);
}

let badge = document.getElementById("suggestionBadge");

if(badge){
    badge.style.display = "none";
}
}
