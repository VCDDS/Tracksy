<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="login-bar">
    <h1>Tracksy</h1>

    <form id="loginForm">
        <input id="username" placeholder="Benutzername">
        <input id="password" type="password" placeholder="Passwort">
        <button type="submit">Einloggen</button>
    </form>

    <button class="forgot-btn" type="button" onclick="openForgot()">Passwort vergessen</button>
</div>

<div id="forgotModal" class="modal">
    <div class="modal-box">
        <h2>Passwort vergessen</h2>

        <input id="forgotName" placeholder="Name">
        <input id="forgotEmail" placeholder="Email">

        <button type="button" onclick="sendForgot()">Senden</button>
        <button type="button" onclick="closeForgot()">Schließen</button>
    </div>
</div>

<script>
function ensureAdminExists(){
    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(!users.some(u => u.admin === true)){
        users.push({
            name: "admin",
            pw: "admin",
            admin: true
        });

        localStorage.setItem("users", JSON.stringify(users));
    }
}
ensureAdminExists();

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let foundUser = users.find(u => u.name === username && u.pw === password);

    if(!foundUser){
        alert("Benutzername oder Passwort falsch");
        return;
    }

    localStorage.setItem("username", foundUser.name);
    localStorage.setItem("isAdmin", foundUser.admin === true ? "true" : "false");

    window.location.href = "/dashboard";
});

function openForgot(){
    document.getElementById("forgotModal").style.display = "flex";
}

function closeForgot(){
    document.getElementById("forgotModal").style.display = "none";
}

function sendForgot(){
    let name = document.getElementById("forgotName").value;
    let email = document.getElementById("forgotEmail").value;

    if(!name || !email){
        alert("Bitte alles ausfüllen");
        return;
    }

    let messages = JSON.parse(localStorage.getItem("messages")) || [];

    messages.push({
        from: name,
        to: "admin",
        text: "Passwort vergessen: " + email,
        comment: "Passwort vergessen",
        date: new Date().toLocaleString()
    });

    localStorage.setItem("messages", JSON.stringify(messages));

    alert("Nachricht gesendet");
    closeForgot();
}
</script>

</body>
</html>
