<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="login-bar">
    <h1>Tracksy</h1>

    <form id="loginForm">
        <input id="username" placeholder="Benutzername">
        <input id="password" type="password" placeholder="Passwort">
        <button type="submit">Einloggen</button>
    </form>

    <button class="forgot-btn" type="button" onclick="openForgot()">Passwort vergessen</button>
</div>

<div id="forgotModal" class="modal">
    <div class="modal-box">
        <h2>Passwort vergessen</h2>

        <input id="forgotName" placeholder="Name">
        <input id="forgotEmail" placeholder="Email">

        <button type="button" onclick="sendForgot()">Senden</button>
        <button type="button" onclick="closeForgot()">Schließen</button>
    </div>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async function(e){
        e.preventDefault();
    
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
    
        let response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "username=" + encodeURIComponent(username) + "&password=" + encodeURIComponent(password)
        });
    
        if(response.redirected){
            localStorage.setItem("username", username);
            localStorage.setItem("isAdmin", username === "admin" ? "true" : "false");
            window.location.href = response.url;
        } else {
            alert("Benutzername oder Passwort falsch");
        }
    });
    
    function openForgot(){
        document.getElementById("forgotModal").style.display = "flex";
    }
    
    function closeForgot(){
        document.getElementById("forgotModal").style.display = "none";
    }
    
    function sendForgot(){
        alert("Passwort vergessen Funktion folgt mit Datenbank");
        closeForgot();
    }
    </script>

</body>
</html>
